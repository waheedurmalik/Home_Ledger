<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;background:#0d0f0e;color:#e8ede8;font-family:system-ui,sans-serif;}
  #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#0d0f0e;z-index:9999;transition:opacity 0.3s;}

  .sub{font-size:13px;color:#4a5a4a;}

</style>

<div id="splash">
  <div class="logo">Finance Analyser<span class="dot">.</span></div>

  <div id="err"></div>
</div>
<div id="root"></div>
<script>
function showErr(msg){
  document.getElementById('splash-msg').style.display='none';

</script>
